name: test

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest" ]
        # keep in sync with requires-python in pyproject.toml (>=3.10,<3.14)
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Pre-install CPU-only torch so the project install below does not pull
      # the multi-GB CUDA wheels onto the runner.
      - name: Install CPU-only torch
        run: >
          python -m pip install --index-url https://download.pytorch.org/whl/cpu
          "torch>=2.7.0,<2.8.0"
          "torchvision>=0.22.0,<0.23.0"
          "torchaudio>=2.7.0,<2.8.0"
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run tests
        run: python -m pytest tests/
